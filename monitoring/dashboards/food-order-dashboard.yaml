apiVersion: v1
kind: ConfigMap
metadata:
  name: food-order-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  food-order-dashboard.json: |
    {
      "title": "Food Order System",
      "uid": "food-order-main",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Requests por segundo (todos los servicios)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace='production'}[1m])) by (service)",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Latencia p95 por servicio (segundos)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace='production'}[5m])) by (le, service))",
              "legendFormat": "p95 {{service}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Tasa de errores 5xx (%)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "100 * sum(rate(http_requests_total{namespace='production', status=~'5..'}[5m])) by (service) / sum(rate(http_requests_total{namespace='production'}[5m])) by (service)",
              "legendFormat": "errors % {{service}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Pods disponibles por servicio",
          "type": "stat",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "kube_deployment_status_available_replicas{namespace='production'}",
              "legendFormat": "{{deployment}}"
            }
          ]
        },
        {
          "id": 5,
          "title": "Uso de CPU por pod (production)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace='production', container!=''}[2m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 6,
          "title": "Uso de memoria por pod (production)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace='production', container!=''}) by (pod) / 1024 / 1024",
              "legendFormat": "{{pod}} MB"
            }
          ]
        },
        {
          "id": 7,
          "title": "Estado del HPA — réplicas actuales vs deseadas",
          "type": "table",
          "gridPos": { "x": 0, "y": 24, "w": 24, "h": 6 },
          "targets": [
            {
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace='production'}",
              "legendFormat": "actual — {{horizontalpodautoscaler}}"
            },
            {
              "expr": "kube_horizontalpodautoscaler_spec_max_replicas{namespace='production'}",
              "legendFormat": "max — {{horizontalpodautoscaler}}"
            }
          ]
        },
        {
          "id": 8,
          "title": "Node.js — Event Loop Lag (ms)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 30, "w": 12, "h": 7 },
          "targets": [
            {
              "expr": "nodejs_eventloop_lag_seconds{namespace='production'} * 1000",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 9,
          "title": "Reinicios de pods (CrashLoopBackOff indicator)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 30, "w": 12, "h": 7 },
          "targets": [
            {
              "expr": "increase(kube_pod_container_status_restarts_total{namespace='production'}[30m])",
              "legendFormat": "{{pod}}"
            }
          ]
        }
      ]
    }
