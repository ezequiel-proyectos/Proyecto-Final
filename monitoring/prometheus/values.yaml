# ─────────────────────────────────────────────────────────────────
# kube-prometheus-stack values para Food Order System
# ─────────────────────────────────────────────────────────────────

# ── Prometheus ────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    # Retención de métricas: 15 días
    retention: 15d
    retentionSize: "8GB"

    # Volumen persistente para las métricas
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: do-block-storage
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Scrape de todos los ServiceMonitors del cluster
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

    # Recursos
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  # Reglas de alertas personalizadas para los microservicios
  additionalPrometheusRulesMap:
    food-order-alerts:
      groups:
        - name: food-order.microservices
          rules:
            # Alerta si un pod lleva más de 2 minutos en CrashLoopBackOff
            - alert: PodCrashLooping
              expr: |
                rate(kube_pod_container_status_restarts_total{namespace=~"production|staging"}[5m]) * 60 > 1
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "Pod en CrashLoopBackOff"
                description: "{{ $labels.pod }} en {{ $labels.namespace }} reiniciando frecuentemente."

            # Alerta si un servicio tiene latencia p95 > 2s
            - alert: HighResponseLatency
              expr: |
                histogram_quantile(0.95,
                  rate(http_request_duration_seconds_bucket{namespace="production"}[5m])
                ) > 2
              for: 3m
              labels:
                severity: warning
              annotations:
                summary: "Latencia alta en {{ $labels.service }}"
                description: "p95 de {{ $labels.service }} supera los 2 segundos."

            # Alerta si la tasa de error 5xx supera el 5%
            - alert: HighErrorRate
              expr: |
                rate(http_requests_total{status=~"5..",namespace="production"}[5m])
                /
                rate(http_requests_total{namespace="production"}[5m])
                > 0.05
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "Tasa de errores 5xx elevada en {{ $labels.service }}"
                description: "Más del 5% de las solicitudes están fallando."

            # Alerta si un deployment tiene menos réplicas que las deseadas
            - alert: DeploymentReplicasMismatch
              expr: |
                kube_deployment_spec_replicas{namespace="production"}
                != kube_deployment_status_available_replicas{namespace="production"}
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "Réplicas no disponibles en {{ $labels.deployment }}"
                description: "{{ $labels.deployment }} no tiene todas sus réplicas disponibles."

# ── Alertmanager ──────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: do-block-storage
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

  config:
    global:
      resolve_timeout: 5m

    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "default"
      routes:
        - match:
            severity: critical
          receiver: "critical-alerts"

    receivers:
      - name: "default"
        # Configura aquí tu webhook de Slack, email, etc.
        # webhook_configs:
        #   - url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"

      - name: "critical-alerts"
        # webhook_configs:
        #   - url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
        #     title: "🚨 ALERTA CRÍTICA — Food Order"

# ── Grafana ───────────────────────────────────────────────────────
grafana:
  # adminPassword se pasa por CLI en setup-monitoring.sh
  adminUser: admin

  persistence:
    enabled: true
    storageClassName: do-block-storage
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

  # Dashboards pre-cargados desde ConfigMaps
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: monitoring

  # Data sources pre-configurados
  additionalDataSources:
    - name: Prometheus
      type: prometheus
      url: http://kube-prometheus-stack-prometheus:9090
      access: proxy
      isDefault: true

  # Ingress para acceso externo a Grafana (opcional)
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - grafana.foodorder.example.com
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.foodorder.example.com

# ── Node Exporter ─────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ── kube-state-metrics ────────────────────────────────────────────
kubeStateMetrics:
  enabled: true
