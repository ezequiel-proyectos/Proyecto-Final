# ServiceMonitor — le dice a Prometheus qué servicios scrapear y con qué frecuencia.
# Aplicar con: kubectl apply -f monitoring/prometheus/service-monitors.yaml
# ─────────────────────────────────────────────────────────────────

# ── API Gateway ───────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-gateway-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames: [production, staging]
  selector:
    matchLabels:
      app: api-gateway
  endpoints:
    - port: "8080"
      path: /metrics
      interval: 15s
---
