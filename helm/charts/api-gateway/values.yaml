replicaCount: 2

image:
  repository: registry.digitalocean.com/REGISTRY_NAME/food-order-api-gateway
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "400m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 60

env:
  PORT: "8080"
  USERS_SERVICE_URL: "http://users-svc:3001"
  CATALOG_SERVICE_URL: "http://catalog-svc:3002"
  ORDERS_SERVICE_URL: "http://orders-svc:3003"
  PAYMENTS_SERVICE_URL: "http://payments-svc:3004"
  NOTIFICATIONS_SERVICE_URL: "http://notifications-svc:3005"

secretName: api-gateway-secret

livenessProbe:
  path: /health
  initialDelaySeconds: 15
  periodSeconds: 15

readinessProbe:
  path: /health
  initialDelaySeconds: 8
  periodSeconds: 10
