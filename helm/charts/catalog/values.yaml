replicaCount: 2

image:
  repository: registry.digitalocean.com/REGISTRY_NAME/food-order-catalog
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 3002

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

env:
  PORT: "3002"
  DB_HOST: "mysql-catalog"
  DB_PORT: "3306"
  DB_NAME: "catalog_db"
  DB_USER: "appuser"

secretName: catalog-secret

livenessProbe:
  path: /health
  initialDelaySeconds: 20
  periodSeconds: 15

readinessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 10
