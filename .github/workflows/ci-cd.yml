name: CI/CD — Food Order System

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: registry.digitalocean.com
  REGISTRY_NAME: ${{ secrets.DO_REGISTRY_NAME }}
  IMAGE_PREFIX: registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/food-order

jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1 — Lint: valida sintaxis de cada servicio en paralelo
  # ════════════════════════════════════════════════════════════════
  lint:
    name: "Lint · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [users, catalog, orders, payments, notifications, api-gateway]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: services/${{ matrix.service }}
        run: npm install

      - name: Syntax check
        working-directory: services/${{ matrix.service }}
        run: |
          for f in $(find src -name "*.js"); do
            node --check "$f" && echo "✓ $f"
          done

  # ════════════════════════════════════════════════════════════════
  # JOB 2 — Build & Push: construye y sube imágenes Docker al registry
  # Solo en push a main (no en PRs)
  # ════════════════════════════════════════════════════════════════
  build-and-push:
    name: "Build & Push · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        service: [users, catalog, orders, payments, notifications, api-gateway]
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Login al DO Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Calcular tags de imagen
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "tag_sha=${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "tag_latest=${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest" >> $GITHUB_OUTPUT

      - name: Build imagen Docker
        run: |
          docker build \
            --label "git.sha=${{ github.sha }}" \
            --label "git.branch=${{ github.ref_name }}" \
            --label "built.at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t ${{ steps.meta.outputs.tag_sha }} \
            -t ${{ steps.meta.outputs.tag_latest }} \
            services/${{ matrix.service }}

      - name: Push al registry (SHA + latest)
        run: |
          docker push ${{ steps.meta.outputs.tag_sha }}
          docker push ${{ steps.meta.outputs.tag_latest }}

      - name: Resumen del build
        run: |
          echo "### 🐳 Imagen publicada" >> $GITHUB_STEP_SUMMARY
          echo "- Servicio: \`${{ matrix.service }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Tag SHA: \`${{ steps.meta.outputs.tag_sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  # JOB 3 — Deploy a Staging
  # ════════════════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.foodorder.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Instalar doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Conectar al cluster DOKS
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DOKS_CLUSTER_NAME }}

      - name: Instalar Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.14.0"

      - name: Calcular SHA corto
        id: sha
        run: echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Crear/actualizar secrets en staging
        run: |
          kubectl create secret generic users-secret \
            --namespace=staging \
            --from-literal=DB_PASS="${{ secrets.DB_PASS }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic catalog-secret \
            --namespace=staging \
            --from-literal=DB_PASS="${{ secrets.DB_PASS }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic orders-secret \
            --namespace=staging \
            --from-literal=DB_PASS="${{ secrets.DB_PASS }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic payments-secret \
            --namespace=staging \
            --from-literal=DB_PASS="${{ secrets.DB_PASS }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic notifications-secret \
            --namespace=staging \
            --from-literal=PLACEHOLDER="none" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic api-gateway-secret \
            --namespace=staging \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade — Staging (todos los servicios)
        run: |
          SHORT_SHA=${{ steps.sha.outputs.short_sha }}
          cd helm

          # Actualizar dependencias del chart paraguas
          helm dependency update food-order

          helm upgrade --install food-order-staging ./food-order \
            --namespace staging \
            --create-namespace \
            --set users.image.tag="${SHORT_SHA}" \
            --set catalog.image.tag="${SHORT_SHA}" \
            --set orders.image.tag="${SHORT_SHA}" \
            --set payments.image.tag="${SHORT_SHA}" \
            --set notifications.image.tag="${SHORT_SHA}" \
            --set api-gateway.image.tag="${SHORT_SHA}" \
            --set users.image.repository="${{ env.IMAGE_PREFIX }}-users" \
            --set catalog.image.repository="${{ env.IMAGE_PREFIX }}-catalog" \
            --set orders.image.repository="${{ env.IMAGE_PREFIX }}-orders" \
            --set payments.image.repository="${{ env.IMAGE_PREFIX }}-payments" \
            --set notifications.image.repository="${{ env.IMAGE_PREFIX }}-notifications" \
            --set api-gateway.image.repository="${{ env.IMAGE_PREFIX }}-api-gateway" \
            --timeout 5m \
            --wait

      - name: Verificar pods en staging
        run: |
          echo "── Pods en staging ──"
          kubectl get pods -n staging
          echo "── Services en staging ──"
          kubectl get svc -n staging

  # ════════════════════════════════════════════════════════════════
  # JOB 4 — Smoke Tests en Staging
  # ════════════════════════════════════════════════════════════════
  smoke-tests:
    name: Smoke Tests → Staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - name: Instalar doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Conectar al cluster DOKS
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DOKS_CLUSTER_NAME }}

      - name: Port-forward del gateway de staging
        run: |
          kubectl port-forward svc/api-gateway-svc 8080:8080 -n staging &
          sleep 5

      - name: Health checks de todos los servicios
        run: |
          BASE="http://localhost:8080"

          check() {
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$1")
            if [ "$STATUS" = "200" ]; then
              echo "✓ $1 → $STATUS"
            else
              echo "✗ $1 → $STATUS"
              exit 1
            fi
          }

          check "$BASE/health"

      - name: Smoke test — registro de usuario
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8080/api/users/register \
            -H "Content-Type: application/json" \
            -d '{"name":"Smoke Test","email":"smoke_'$GITHUB_RUN_ID'@test.com","password":"test1234"}')

          echo "Respuesta: $RESPONSE"
          echo "$RESPONSE" | grep -q '"token"' && echo "✓ Registro OK" || (echo "✗ Registro FALLÓ" && exit 1)

      - name: Smoke test — listado de restaurantes
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/restaurants)
          [ "$STATUS" = "200" ] && echo "✓ Catálogo OK" || (echo "✗ Catálogo FALLÓ: $STATUS" && exit 1)

  # ════════════════════════════════════════════════════════════════
  # JOB 5 — Deploy a Production
  # ════════════════════════════════════════════════════════════════
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: smoke-tests
    environment:
      name: production
      url: https://api.foodorder.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Instalar doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Conectar al cluster DOKS
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DOKS_CLUSTER_NAME }}

      - name: Instalar Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.14.0"

      - name: Calcular SHA corto
        id: sha
        run: echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Crear/actualizar secrets en production
        run: |
          for SVC in users orders payments api-gateway; do
            kubectl create secret generic ${SVC}-secret \
              --namespace=production \
              --from-literal=DB_PASS="${{ secrets.DB_PASS }}" \
              --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              --dry-run=client -o yaml | kubectl apply -f -
          done
          kubectl create secret generic catalog-secret \
            --namespace=production \
            --from-literal=DB_PASS="${{ secrets.DB_PASS }}" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic notifications-secret \
            --namespace=production \
            --from-literal=PLACEHOLDER="none" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade — Production
        id: helm_prod
        run: |
          SHORT_SHA=${{ steps.sha.outputs.short_sha }}
          cd helm
          helm dependency update food-order

          helm upgrade --install food-order-prod ./food-order \
            --namespace production \
            --create-namespace \
            --set users.image.tag="${SHORT_SHA}" \
            --set catalog.image.tag="${SHORT_SHA}" \
            --set orders.image.tag="${SHORT_SHA}" \
            --set payments.image.tag="${SHORT_SHA}" \
            --set notifications.image.tag="${SHORT_SHA}" \
            --set api-gateway.image.tag="${SHORT_SHA}" \
            --set users.image.repository="${{ env.IMAGE_PREFIX }}-users" \
            --set catalog.image.repository="${{ env.IMAGE_PREFIX }}-catalog" \
            --set orders.image.repository="${{ env.IMAGE_PREFIX }}-orders" \
            --set payments.image.repository="${{ env.IMAGE_PREFIX }}-payments" \
            --set notifications.image.repository="${{ env.IMAGE_PREFIX }}-notifications" \
            --set api-gateway.image.repository="${{ env.IMAGE_PREFIX }}-api-gateway" \
            --timeout 8m \
            --wait \
            --atomic   # <-- rollback automático si falla el deploy

      - name: Verificar rollout en production
        run: |
          echo "── Pods en production ──"
          kubectl get pods -n production
          echo "── HPA en production ──"
          kubectl get hpa -n production

      - name: Notificar deploy exitoso
        if: success()
        run: |
          echo "### ✅ Deploy a Production exitoso" >> $GITHUB_STEP_SUMMARY
          echo "- SHA: \`${{ steps.sha.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://api.foodorder.example.com" >> $GITHUB_STEP_SUMMARY
          echo "- Hora: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY

      - name: Notificar deploy fallido (rollback ejecutado)
        if: failure()
        run: |
          echo "### ❌ Deploy FALLÓ — Helm ejecutó rollback automático" >> $GITHUB_STEP_SUMMARY
          echo "- Production sigue corriendo la versión anterior" >> $GITHUB_STEP_SUMMARY
          kubectl rollout history deployment -n production
