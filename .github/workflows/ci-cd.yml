name: CI/CD — Food Order System

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_PREFIX: registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/food-order

jobs:
  lint:
    name: "Lint · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [users, catalog, orders, payments, notifications, api-gateway]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        working-directory: services/${{ matrix.service }}
        run: npm install
      - name: Syntax check
        working-directory: services/${{ matrix.service }}
        run: |
          for f in $(find src -name "*.js"); do
            node --check "$f" && echo "✓ $f"
          done

  build-and-push:
    name: "Build & Push · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        service: [users, catalog, orders, payments, notifications, api-gateway]
    steps:
      - uses: actions/checkout@v4
      - name: Instalar doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}
      - name: Login al DO Container Registry
        run: doctl registry login --expiry-seconds 1200
      - name: Calcular tags
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "tag_sha=${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "tag_latest=${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest" >> $GITHUB_OUTPUT
      - name: Build imagen Docker
        run: |
          docker build \
            -t ${{ steps.meta.outputs.tag_sha }} \
            -t ${{ steps.meta.outputs.tag_latest }} \
            services/${{ matrix.service }}
      - name: Push al registry
        run: |
          docker push ${{ steps.meta.outputs.tag_sha }}
          docker push ${{ steps.meta.outputs.tag_latest }}

  deploy-staging:
    name: Deploy a Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Instalar doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}
      - name: Conectar al cluster DOKS
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DOKS_CLUSTER_NAME }}
      - name: Instalar Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"
      - name: Calcular SHA corto
        id: sha
        run: echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
      - name: Crear secrets en staging
        run: |
          kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic users-secret --namespace=staging --from-literal=DB_PASS="${{ secrets.DB_PASS }}" --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic catalog-secret --namespace=staging --from-literal=DB_PASS="${{ secrets.DB_PASS }}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic orders-secret --namespace=staging --from-literal=DB_PASS="${{ secrets.DB_PASS }}" --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic payments-secret --namespace=staging --from-literal=DB_PASS="${{ secrets.DB_PASS }}" --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic notifications-secret --namespace=staging --from-literal=PLACEHOLDER="none" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic api-gateway-secret --namespace=staging --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Limpiar recursos huérfanos
        run: |
          kubectl delete deployment food-order-staging -n staging --ignore-not-found=true
          kubectl delete service food-order-staging-svc -n staging --ignore-not-found=true

      - name: Helm upgrade Staging
        run: |
          SHORT_SHA=${{ steps.sha.outputs.short_sha }}
          cd helm
          helm dependency update food-order
          helm upgrade --install food-order-staging ./food-order \
            --namespace staging \
            --create-namespace \
            --cleanup-on-fail \
            --force \
            --set api-gateway.ingress.enabled=false \
            --set users.image.tag="${SHORT_SHA}" \
            --set catalog.image.tag="${SHORT_SHA}" \
            --set orders.image.tag="${SHORT_SHA}" \
            --set payments.image.tag="${SHORT_SHA}" \
            --set notifications.image.tag="${SHORT_SHA}" \
            --set api-gateway.image.tag="${SHORT_SHA}" \
            --set users.image.repository="${{ env.IMAGE_PREFIX }}-users" \
            --set catalog.image.repository="${{ env.IMAGE_PREFIX }}-catalog" \
            --set orders.image.repository="${{ env.IMAGE_PREFIX }}-orders" \
            --set payments.image.repository="${{ env.IMAGE_PREFIX }}-payments" \
            --set notifications.image.repository="${{ env.IMAGE_PREFIX }}-notifications" \
            --set api-gateway.image.repository="${{ env.IMAGE_PREFIX }}-api-gateway" \
            --timeout 5m --wait
      - name: Verificar pods staging
        run: kubectl get pods -n staging

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4
      - name: Instalar doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}
      - name: Conectar al cluster DOKS
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DOKS_CLUSTER_NAME }}
      - name: Port-forward gateway
        run: |
          kubectl port-forward svc/api-gateway-svc 8080:8080 -n staging &
          sleep 8
      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health)
          [ "$STATUS" = "200" ] && echo "OK" || (echo "FALLO: $STATUS" && exit 1)
      - name: Test registro
        run: |
          R=$(curl -s -X POST http://localhost:8080/api/users/register \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"Smoke\",\"email\":\"smoke_${GITHUB_RUN_ID}@test.com\",\"password\":\"test1234\"}")
          echo "$R" | grep -q '"token"' && echo "OK" || (echo "FALLO" && exit 1)

  deploy-production:
    name: Deploy a Production
    runs-on: ubuntu-latest
    needs: smoke-tests
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - name: Instalar doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}
      - name: Conectar al cluster DOKS
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DOKS_CLUSTER_NAME }}
      - name: Instalar Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"
      - name: Calcular SHA corto
        id: sha
        run: echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
      - name: Crear secrets en production
        run: |
          kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -
          for SVC in users orders payments api-gateway; do
            kubectl create secret generic ${SVC}-secret --namespace=production --from-literal=DB_PASS="${{ secrets.DB_PASS }}" --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" --dry-run=client -o yaml | kubectl apply -f -
          done
          kubectl create secret generic catalog-secret --namespace=production --from-literal=DB_PASS="${{ secrets.DB_PASS }}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic notifications-secret --namespace=production --from-literal=PLACEHOLDER="none" --dry-run=client -o yaml | kubectl apply -f -
      - name: Helm upgrade Production
        run: |
          SHORT_SHA=${{ steps.sha.outputs.short_sha }}
          cd helm
          helm dependency update food-order
          helm upgrade --install food-order-prod ./food-order \
            --namespace production --create-namespace \
            --set users.image.tag="${SHORT_SHA}" \
            --set catalog.image.tag="${SHORT_SHA}" \
            --set orders.image.tag="${SHORT_SHA}" \
            --set payments.image.tag="${SHORT_SHA}" \
            --set notifications.image.tag="${SHORT_SHA}" \
            --set api-gateway.image.tag="${SHORT_SHA}" \
            --set users.image.repository="${{ env.IMAGE_PREFIX }}-users" \
            --set catalog.image.repository="${{ env.IMAGE_PREFIX }}-catalog" \
            --set orders.image.repository="${{ env.IMAGE_PREFIX }}-orders" \
            --set payments.image.repository="${{ env.IMAGE_PREFIX }}-payments" \
            --set notifications.image.repository="${{ env.IMAGE_PREFIX }}-notifications" \
            --set api-gateway.image.repository="${{ env.IMAGE_PREFIX }}-api-gateway" \
            --timeout 8m --wait --atomic
      - name: Verificar rollout
        run: kubectl get pods -n production
      - name: Resumen
        if: success()
        run: |
          echo "### Deploy exitoso" >> $GITHUB_STEP_SUMMARY
          echo "- SHA: ${{ steps.sha.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- IP: 159.203.152.235" >> $GITHUB_STEP_SUMMARY